<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#3B82F6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HomeVoice - 家音英语</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        .material-symbols-rounded { font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24; font-family: 'Material Symbols Rounded'; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        'primary-dark': '#2563EB',
                        secondary: '#10B981',
                        accent: '#F59E0B',
                        surface: '#F8FAFC',
                        'surface-card': '#FFFFFF',
                        'on-surface': '#1E293B',
                        'on-surface-muted': '#64748B'
                    },
                    fontFamily: {
                        sans: ['Noto Sans SC', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; }
        .material-symbols-rounded { font-variation-settings: 'FILL' 1, 'wght' 400; }
        .material-symbols-rounded { font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24; font-family: 'Material Symbols Rounded'; }
        
        /* 波形动画 */
        .waveform-container { display: flex; align-items: center; justify-content: center; gap: 3px; height: 80px; }
        .waveform-bar { width: 4px; background: linear-gradient(180deg, #3B82F6 0%, #10B981 100%); border-radius: 2px; transition: height 0.1s ease; }
        .waveform-bar.recording { animation: waveAnimate 0.5s ease-in-out infinite; }
        @keyframes waveAnimate { 0%, 100% { height: 20%; } 50% { height: 100%; } }
        
        /* 卡片动画 */
        .card-enter { animation: cardEnter 0.4s ease-out; }
        @keyframes cardEnter { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 按钮按压效果 */
        .btn-active:active { transform: scale(0.95); }
        
        /* 录音按钮脉冲 */
        .record-pulse { animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
        
        /* 模态框 */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 24px; padding: 24px; max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto; animation: modalEnter 0.3s ease-out; }
        @keyframes modalEnter { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        /* 分享卡片 */
        .share-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 16px; padding: 24px; color: white; }
        
        /* 成功动画 */
        .success-check { animation: checkPop 0.4s ease-out; }
        @keyframes checkPop { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        
        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-surface min-h-screen">
    <!-- 顶部导航 -->
    <nav class="fixed top-0 left-0 right-0 bg-white/90 backdrop-blur-lg shadow-sm z-50">
        <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
                    <span class="material-symbols-rounded text-primary text-2xl">record_voice_over</span>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-on-surface">HomeVoice</h1>
                    <p class="text-xs text-on-surface-muted">家音英语 · 子女端</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="showLibrary()" class="w-10 h-10 rounded-full hover:bg-surface flex items-center justify-center btn-active" title="词库">
                    <span class="material-symbols-rounded text-on-surface-muted">menu_book</span>
                </button>
                <button onclick="showStats()" class="w-10 h-10 rounded-full hover:bg-surface flex items-center justify-center btn-active" title="统计">
                    <span class="material-symbols-rounded text-on-surface-muted">analytics</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="pt-20 pb-32 px-4">
        <div class="max-w-2xl mx-auto">
            <!-- 头部信息 -->
            <header class="mb-6">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs font-semibold text-primary bg-primary/10 px-3 py-1 rounded-full">每日灵感</span>
                    <span class="text-xs text-on-surface-muted" id="current-date"></span>
                </div>
                <h2 class="text-2xl font-bold text-on-surface">今日单词卡片</h2>
                <p class="text-sm text-on-surface-muted mt-1">长按录音，分享给家人</p>
            </header>

            <!-- 场景选择器 -->
            <div class="mb-6">
                <div class="flex gap-2 overflow-x-auto no-scrollbar" id="scene-selector">
                    <!-- 场景按钮由 JS 生成 -->
                </div>
            </div>

            <!-- 单词卡片列表 -->
            <div id="cards-container" class="space-y-4">
                <!-- 卡片由 JS 生成 -->
            </div>

            <!-- AI 提示 -->
            <div class="mt-6 p-4 bg-gradient-to-r from-primary/10 to-secondary/10 rounded-2xl border border-primary/20">
                <div class="flex items-start gap-3">
                    <span class="material-symbols-rounded text-primary text-2xl">lightbulb</span>
                    <div>
                        <p class="text-sm font-semibold text-on-surface mb-1">💡 录音小贴士</p>
                        <p class="text-sm text-on-surface-muted" id="ai-tip">录制时语速放慢，像平时和家人聊天一样自然就好～</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部操作栏 -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-surface p-4 z-40">
        <div class="max-w-2xl mx-auto">
            <button id="send-btn" onclick="showSendPreview()" disabled class="w-full h-14 bg-gray-300 text-white rounded-2xl font-bold flex items-center justify-center gap-2 btn-active disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                <span class="material-symbols-rounded text-2xl">send</span>
                <span>选择单词后录音</span>
            </button>
            <p class="text-center text-xs text-on-surface-muted mt-2" id="recorded-count">已录制 0/3 个单词</p>
        </div>
    </div>

    <!-- 录音模态框 -->
    <div id="record-modal" class="modal">
        <div class="modal-content">
            <div class="text-center mb-6">
                <div class="w-16 h-16 mx-auto mb-3 bg-primary/10 rounded-full flex items-center justify-center">
                    <span class="material-symbols-rounded text-primary text-4xl" id="record-word-icon">record_voice_over</span>
                </div>
                <h3 class="text-2xl font-bold text-on-surface" id="record-word-title">Passport</h3>
                <p class="text-sm text-on-surface-muted" id="record-word-meaning">护照</p>
            </div>

            <!-- 波形显示 -->
            <div class="bg-surface rounded-2xl p-6 mb-6">
                <div class="waveform-container" id="waveform">
                    <!-- 波形条由 JS 生成 -->
                </div>
                <p class="text-center text-sm text-on-surface-muted mt-3" id="record-status">点击按钮开始录音</p>
                <p class="text-center text-xs text-on-surface-muted mt-1" id="record-timer">00:00</p>
            </div>

            <!-- 录音按钮 -->
            <button id="record-btn" onmousedown="startRecording()" onmouseup="stopRecording()" ontouchstart="startRecording(event)" ontouchend="stopRecording(event)" class="w-full h-20 bg-gradient-to-r from-primary to-primary-dark text-white rounded-full font-bold text-lg flex items-center justify-center gap-3 btn-active record-pulse shadow-lg shadow-primary/30">
                <span class="material-symbols-rounded text-4xl" id="record-icon">mic</span>
                <span id="record-text">长按录音</span>
            </button>

            <!-- 取消按钮 -->
            <button onclick="closeRecordModal()" class="w-full mt-3 h-12 text-on-surface-muted hover:bg-surface rounded-xl font-medium btn-active">取消</button>
        </div>
    </div>

    <!-- 发送预览模态框 -->
    <div id="preview-modal" class="modal">
        <div class="modal-content">
            <div class="text-center mb-6">
                <div class="w-20 h-20 mx-auto mb-4 bg-gradient-to-br from-primary to-secondary rounded-3xl flex items-center justify-center shadow-lg">
                    <span class="material-symbols-rounded text-white text-5xl">inventory_2</span>
                </div>
                <h3 class="text-2xl font-bold text-on-surface">声音包裹已打包</h3>
                <p class="text-sm text-on-surface-muted mt-1">共 <span class="font-bold text-primary" id="preview-count">0</span> 个单词</p>
            </div>

            <!-- 预览列表 -->
            <div id="preview-list" class="space-y-3 mb-6 max-h-60 overflow-y-auto">
                <!-- 预览项由 JS 生成 -->
            </div>

            <!-- 分享方式 -->
            <div class="space-y-3">
                <button onclick="shareToWeChat()" class="w-full h-14 bg-[#07C160] text-white rounded-2xl font-bold flex items-center justify-center gap-3 btn-active shadow-lg shadow-green-200/50">
                    <span class="material-symbols-rounded text-2xl">chat</span>
                    <span>分享到微信</span>
                </button>
                <button onclick="copyShareLink()" class="w-full h-14 bg-surface text-on-surface rounded-2xl font-bold flex items-center justify-center gap-3 btn-active">
                    <span class="material-symbols-outlined text-2xl">link</span>
                    <span>复制链接</span>
                </button>
            </div>

            <button onclick="closePreviewModal()" class="w-full mt-3 h-12 text-on-surface-muted hover:bg-surface rounded-xl font-medium btn-active">返回继续</button>
        </div>
    </div>

    <!-- 统计模态框 -->
    <div id="stats-modal" class="modal">
        <div class="modal-content">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-on-surface">学习统计</h3>
                <button onclick="closeStats()" class="w-8 h-8 rounded-full hover:bg-surface flex items-center justify-center btn-active">
                    <span class="material-symbols-outlined text-on-surface-muted">close</span>
                </button>
            </div>
            <div class="grid grid-cols-3 gap-4 mb-6">
                <div class="bg-primary/10 rounded-2xl p-4 text-center">
                    <p class="text-3xl font-bold text-primary" id="stat-total">0</p>
                    <p class="text-xs text-on-surface-muted mt-1">总学习</p>
                </div>
                <div class="bg-secondary/10 rounded-2xl p-4 text-center">
                    <p class="text-3xl font-bold text-secondary" id="stat-week">0</p>
                    <p class="text-xs text-on-surface-muted mt-1">本周</p>
                </div>
                <div class="bg-accent/10 rounded-2xl p-4 text-center">
                    <p class="text-3xl font-bold text-accent" id="stat-streak">0</p>
                    <p class="text-xs text-on-surface-muted mt-1">连续天数</p>
                </div>
            </div>
            <div class="bg-surface rounded-2xl p-4">
                <h4 class="text-sm font-semibold text-on-surface mb-3">最近记录</h4>
                <div id="stats-recent" class="space-y-2">
                    <!-- 最近记录由 JS 生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 bg-on-surface text-white px-6 py-3 rounded-full shadow-lg z-[150] transition-all duration-300 opacity-0 pointer-events-none">
        <span id="toast-message">操作成功</span>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
