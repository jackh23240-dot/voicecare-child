<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#60A5FA"/>
    </linearGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  
  <!-- 麦克风主体 -->
  <rect x="35" y="28" width="30" height="40" rx="15" fill="white"/>
  
  <!-- 麦克风顶部 -->
  <circle cx="50" cy="28" r="15" fill="white"/>
  
  <!-- 麦克风支架 -->
  <rect x="46" y="68" width="8" height="12" fill="white"/>
  <path d="M30 85 Q50 95 70 85" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- 声波效果 -->
  <circle cx="50" cy="50" r="22" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none">
    <animate attributeName="r" values="22;28;22" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="50" r="28" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none">
    <animate attributeName="r" values="28;34;28" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
</svg>
